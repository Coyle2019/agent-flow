<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Flow - 注册账号</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Agent Flow</h1>
            <p class="subtitle">智能代理工作流平台</p>
        </header>
        
        <!-- System Status Panel -->
        <div id="statusPanel" class="status-panel">
            <h3>系统状态</h3>
            <div class="status-content">
                <div class="status-item">
                    <span class="status-label">Service:</span>
                    <span id="statusService" class="status-value">-</span>
                </div>
                <div class="status-item">
                    <span class="status-label">Status:</span>
                    <span id="statusValue" class="status-value">-</span>
                </div>
            </div>
            <div id="statusLoading" class="status-loading">
                <div class="spinner-small"></div>
                <span>加载中...</span>
            </div>
        </div>
        
        <!-- Error Banner -->
        <div id="errorBanner" class="error-banner hidden">
            <span class="error-icon">⚠️</span>
            <span id="errorMessage">Unable to load system status. Please try again later.</span>
            <button id="dismissError" class="dismiss-btn">×</button>
        </div>
        
        <main>
            <div class="register-card">
                <h2>注册账号</h2>
                
                <form id="registerForm" class="register-form">
                    <div class="form-group">
                        <label for="invitationCode">邀请码 <span class="optional">(可选)</span></label>
                        <input type="text" id="invitationCode" name="invitationCode" placeholder="有邀请码？输入享受专属福利">
                        <div class="validation-status" id="invitationStatus"></div>
                        <span class="error-message" id="invitationError"></span>
                    </div>
                    
                    <div class="form-group">
                        <label for="username">用户名</label>
                        <input type="text" id="username" name="username" placeholder="请输入用户名" required>
                        <span class="error-message" id="usernameError"></span>
                    </div>
                    
                    <div class="form-group">
                        <label for="email">邮箱</label>
                        <input type="email" id="email" name="email" placeholder="请输入邮箱地址" required>
                        <span class="error-message" id="emailError"></span>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">密码</label>
                        <input type="password" id="password" name="password" placeholder="请设置密码（至少8位）" required minlength="8">
                        <button type="button" class="toggle-password" id="togglePassword">显示</button>
                        <span class="error-message" id="passwordError"></span>
                    </div>
                    
                    <div id="alertBox" class="alert hidden"></div>
                    
                    <button type="submit" class="btn-submit" id="submitBtn">立即注册</button>
                </form>
                
                <p class="login-link">已有账号？<a href="#">立即登录</a></p>
            </div>
        </main>
    </div>
    
    <script>
        const form = document.getElementById('registerForm');
        const invitationCodeInput = document.getElementById('invitationCode');
        const invitationStatus = document.getElementById('invitationStatus');
        const invitationError = document.getElementById('invitationError');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const submitBtn = document.getElementById('submitBtn');
        const alertBox = document.getElementById('alertBox');
        const togglePassword = document.getElementById('togglePassword');
        const statusPanel = document.getElementById('statusPanel');
        const statusService = document.getElementById('statusService');
        const statusValue = document.getElementById('statusValue');
        const statusLoading = document.getElementById('statusLoading');
        const errorBanner = document.getElementById('errorBanner');
        const errorMessage = document.getElementById('errorMessage');
        const dismissError = document.getElementById('dismissError');
        
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        let isSubmitting = false;
        let isInvitationValid = false;
        let validateTimeout = null;
        
        // System Status Functions
        async function fetchSystemStatus() {
            statusLoading.style.display = 'flex';
            statusService.textContent = '-';
            statusValue.textContent = '-';
            errorBanner.classList.add('hidden');
            
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 10000);
            
            try {
                const response = await fetch('/api/status', {
                    method: 'GET',
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                
                if (!data || typeof data.service === 'undefined' || typeof data.status === 'undefined') {
                    throw new Error('Invalid response format');
                }
                
                statusService.textContent = data.service || 'N/A';
                statusValue.textContent = data.status || 'N/A';
                statusLoading.style.display = 'none';
            } catch (error) {
                clearTimeout(timeoutId);
                statusLoading.style.display = 'none';
                showError('Unable to load system status. Please try again later.');
            }
        }
        
        function showError(message) {
            errorMessage.textContent = message;
            errorBanner.classList.remove('hidden');
        }
        
        function hideError() {
            errorBanner.classList.add('hidden');
        }
        
        dismissError.addEventListener('click', hideError);
        
        // Fetch status on page load
        fetchSystemStatus();
        
        function validateEmail(email) {
            return emailRegex.test(email);
        }
        
        function showAlert(message, type) {
            alertBox.textContent = message;
            alertBox.className = 'alert ' + type;
        }
        
        function clearAlert() {
            alertBox.className = 'alert hidden';
        }
        
        function showInvitationStatus(message, type, showSpinner = false) {
            invitationStatus.innerHTML = showSpinner ? '<div class="spinner-small"></div>' : '';
            invitationStatus.innerHTML += message;
            invitationStatus.className = 'validation-status ' + type;
        }
        
        function clearInvitationStatus() {
            invitationStatus.className = 'validation-status';
            invitationStatus.innerHTML = '';
            invitationError.textContent = '';
            invitationCodeInput.classList.remove('invalid', 'valid');
            isInvitationValid = false;
        }
        
        async function validateInvitationCode(code) {
            if (!code || !code.trim()) {
                clearInvitationStatus();
                updateSubmitState();
                return;
            }
            
            showInvitationStatus('验证中...', 'loading', true);
            
            try {
                const response = await fetch('/api/invitation/validate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ code: code.trim().toUpperCase() })
                });
                
                const data = await response.json();
                
                if (response.ok && data.valid) {
                    showInvitationStatus('✓ 邀请码有效', 'success');
                    invitationError.textContent = '';
                    invitationCodeInput.classList.remove('invalid');
                    invitationCodeInput.classList.add('valid');
                    isInvitationValid = true;
                } else {
                    const errorMsg = data.message || '此邀请码无效或已过期';
                    showInvitationStatus('', 'error');
                    invitationError.textContent = errorMsg;
                    invitationCodeInput.classList.add('invalid');
                    invitationCodeInput.classList.remove('valid');
                    isInvitationValid = false;
                }
            } catch (error) {
                showInvitationStatus('', 'error');
                invitationError.textContent = '无法验证邀请码，请重试';
                invitationCodeInput.classList.add('invalid');
                invitationCodeInput.classList.remove('valid');
                isInvitationValid = false;
            }
            
            updateSubmitState();
        }
        
        function updateSubmitState() {
            const isValid = emailInput.value && validateEmail(emailInput.value) && 
                           passwordInput.value.length >= 8;
            submitBtn.disabled = !isValid || isSubmitting;
        }
        
        invitationCodeInput.addEventListener('input', () => {
            clearInvitationStatus();
            clearTimeout(validateTimeout);
            validateTimeout = setTimeout(() => {
                validateInvitationCode(invitationCodeInput.value);
            }, 500);
        });
        
        invitationCodeInput.addEventListener('blur', () => {
            clearTimeout(validateTimeout);
            validateInvitationCode(invitationCodeInput.value);
        });
        
        emailInput.addEventListener('input', () => {
            const emailError = document.getElementById('emailError');
            if (emailInput.value && !validateEmail(emailInput.value)) {
                emailError.textContent = '请输入有效的邮箱地址';
                emailInput.classList.add('invalid');
            } else {
                emailError.textContent = '';
                emailInput.classList.remove('invalid');
            }
            updateSubmitState();
        });
        
        passwordInput.addEventListener('input', () => {
            const passwordError = document.getElementById('passwordError');
            if (passwordInput.value && passwordInput.value.length < 8) {
                passwordError.textContent = '密码至少需要8位';
                passwordInput.classList.add('invalid');
            } else {
                passwordError.textContent = '';
                passwordInput.classList.remove('invalid');
            }
            updateSubmitState();
        });
        
        togglePassword.addEventListener('click', () => {
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            togglePassword.textContent = type === 'password' ? '显示' : '隐藏';
        });
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (isSubmitting) return;
            
            if (invitationCodeInput.value && !isInvitationValid) {
                await validateInvitationCode(invitationCodeInput.value);
                if (!isInvitationValid) return;
            }
            
            isSubmitting = true;
            submitBtn.disabled = true;
            submitBtn.textContent = '注册中...';
            clearAlert();
            
            try {
                const response = await fetch('/api/v1/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        email: emailInput.value,
                        password: passwordInput.value,
                        invitationCode: invitationCodeInput.value || null
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showAlert('注册成功，欢迎' + data.username + '！', 'success');
                    form.reset();
                    clearInvitationStatus();
                } else {
                    if (data.message && data.message.includes('邮箱')) {
                        document.getElementById('emailError').textContent = '该邮箱已被注册';
                        emailInput.classList.add('invalid');
                    } else {
                        showAlert(data.message || '注册失败，请重试', 'error');
                    }
                }
            } catch (error) {
                showAlert('网络错误，请检查连接后重试', 'error');
            } finally {
                isSubmitting = false;
                submitBtn.textContent = '立即注册';
                updateSubmitState();
            }
        });
    </script>
</body>
</html>

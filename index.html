<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Flow - 注册账号</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Agent Flow</h1>
            <p class="subtitle">智能代理工作流平台</p>
        </header>
        
        <main>
            <div class="register-card">
                <h2>注册账号</h2>
                
                <form id="registerForm" class="register-form">
                    <div class="form-group">
                        <label for="username">用户名</label>
                        <input type="text" id="username" name="username" placeholder="请输入用户名" required>
                        <span class="error-message" id="usernameError"></span>
                    </div>
                    
                    <div class="form-group">
                        <label for="email">邮箱</label>
                        <input type="email" id="email" name="email" placeholder="请输入邮箱地址" required>
                        <span class="error-message" id="emailError"></span>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">密码</label>
                        <input type="password" id="password" name="password" placeholder="请设置密码（至少8位）" required minlength="8">
                        <button type="button" class="toggle-password" id="togglePassword">显示</button>
                        <span class="error-message" id="passwordError"></span>
                    </div>
                    
                    <div id="alertBox" class="alert hidden"></div>
                    
                    <button type="submit" class="btn-submit" id="submitBtn">立即注册</button>
                </form>
                
                <p class="login-link">已有账号？<a href="#">立即登录</a></p>
            </div>
        </main>
    </div>
    
    <script>
        const form = document.getElementById('registerForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const submitBtn = document.getElementById('submitBtn');
        const alertBox = document.getElementById('alertBox');
        const togglePassword = document.getElementById('togglePassword');
        
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        let isSubmitting = false;
        
        function validateEmail(email) {
            return emailRegex.test(email);
        }
        
        function showAlert(message, type) {
            alertBox.textContent = message;
            alertBox.className = 'alert ' + type;
        }
        
        function clearAlert() {
            alertBox.className = 'alert hidden';
        }
        
        function updateSubmitState() {
            const isValid = emailInput.value && validateEmail(emailInput.value) && 
                           passwordInput.value.length >= 8;
            submitBtn.disabled = !isValid || isSubmitting;
        }
        
        emailInput.addEventListener('input', () => {
            const emailError = document.getElementById('emailError');
            if (emailInput.value && !validateEmail(emailInput.value)) {
                emailError.textContent = '请输入有效的邮箱地址';
                emailInput.classList.add('invalid');
            } else {
                emailError.textContent = '';
                emailInput.classList.remove('invalid');
            }
            updateSubmitState();
        });
        
        passwordInput.addEventListener('input', () => {
            const passwordError = document.getElementById('passwordError');
            if (passwordInput.value && passwordInput.value.length < 8) {
                passwordError.textContent = '密码至少需要8位';
                passwordInput.classList.add('invalid');
            } else {
                passwordError.textContent = '';
                passwordInput.classList.remove('invalid');
            }
            updateSubmitState();
        });
        
        togglePassword.addEventListener('click', () => {
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            togglePassword.textContent = type === 'password' ? '显示' : '隐藏';
        });
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (isSubmitting) return;
            
            isSubmitting = true;
            submitBtn.disabled = true;
            submitBtn.textContent = '注册中...';
            clearAlert();
            
            try {
                const response = await fetch('/api/v1/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        email: emailInput.value,
                        password: passwordInput.value
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showAlert('注册成功，欢迎' + data.username + '！', 'success');
                    form.reset();
                } else {
                    if (data.message && data.message.includes('邮箱')) {
                        document.getElementById('emailError').textContent = '该邮箱已被注册';
                        emailInput.classList.add('invalid');
                    } else {
                        showAlert(data.message || '注册失败，请重试', 'error');
                    }
                }
            } catch (error) {
                showAlert('网络错误，请检查连接后重试', 'error');
            } finally {
                isSubmitting = false;
                submitBtn.textContent = '立即注册';
                updateSubmitState();
            }
        });
    </script>
</body>
</html>

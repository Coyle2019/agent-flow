<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Flow - Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h1 class="title">Agent Flow</h1>
            <p class="subtitle">Sign in to continue</p>
            
            <div id="error-message" class="error-message" style="display: none;"></div>
            
            <form id="login-form" class="login-form">
                <div class="form-group">
                    <label for="username">Username or Email</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username or email" required maxlength="255">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required maxlength="128">
                </div>
                
                <div class="form-group checkbox-group">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember">Remember me</label>
                </div>
                
                <button type="submit" id="login-btn" class="btn-primary">Log In</button>
            </form>
            
            <div class="footer">
                <a href="#forgot" class="link">Forgot your password?</a>
                <p class="signup-link">Don't have an account? <a href="#signup" class="link">Sign up</a></p>
            </div>
        </div>
    </div>
    
    <script>
        const form = document.getElementById('login-form');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const errorMessage = document.getElementById('error-message');
        const loginBtn = document.getElementById('login-btn');
        
        // Clear error when user starts typing
        usernameInput.addEventListener('input', clearError);
        passwordInput.addEventListener('input', clearError);
        
        function clearError() {
            errorMessage.style.display = 'none';
        }
        
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
        }
        
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = usernameInput.value.trim();
            const password = passwordInput.value;
            const remember = document.getElementById('remember').checked;
            
            // Validate inputs
            if (!username) {
                showError('Username is required');
                return;
            }
            
            if (!password) {
                showError('Password is required');
                return;
            }
            
            // Set loading state
            loginBtn.disabled = true;
            loginBtn.textContent = 'Logging in...';
            loginBtn.classList.add('loading');
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password, remember })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    // Store token and redirect
                    if (data.token) {
                        localStorage.setItem('auth_token', data.token);
                        localStorage.setItem('user_id', data.user_id);
                    }
                    window.location.href = '/dashboard';
                } else if (response.status === 401) {
                    showError('Invalid username or password');
                } else {
                    showError('An error occurred. Please try again.');
                }
            } catch (error) {
                if (error.name === 'TypeError' && error.message.includes('fetch')) {
                    showError('Network error. Please check your connection.');
                } else {
                    showError('An error occurred. Please try again.');
                }
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = 'Log In';
                loginBtn.classList.remove('loading');
            }
        });
    </script>
</body>
</html>

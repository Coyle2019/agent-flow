<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Status - Agent Flow</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Agent Flow</h1>
            <p class="subtitle">智能代理工作流平台</p>
        </header>
        
        <main>
            <div class="health-card">
                <h2>Health Status</h2>
                <p class="subtitle-text">Service Health Check</p>
                
                <div class="status-container">
                    <div id="statusLoading" class="status-badge loading">
                        <div class="spinner"></div>
                        <span>Checking health...</span>
                    </div>
                    
                    <div id="statusSuccess" class="status-badge success hidden">
                        <span class="icon">✓</span>
                        <span id="statusText">Service Healthy</span>
                    </div>
                    
                    <div id="statusError" class="status-badge error hidden">
                        <span class="icon">✗</span>
                        <span id="errorText">Health Check Failed</span>
                    </div>
                </div>
                
                <div id="responseSection" class="response-section hidden">
                    <h3>Response Details</h3>
                    <pre id="responseData" class="response-data"></pre>
                </div>
                
                <button id="retryBtn" class="btn-refresh">Retry</button>
                
                <p id="timestamp" class="timestamp"></p>
            </div>
        </main>
    </div>
    
    <script>
        const statusLoading = document.getElementById('statusLoading');
        const statusSuccess = document.getElementById('statusSuccess');
        const statusError = document.getElementById('statusError');
        const statusText = document.getElementById('statusText');
        const errorText = document.getElementById('errorText');
        const responseSection = document.getElementById('responseSection');
        const responseData = document.getElementById('responseData');
        const retryBtn = document.getElementById('retryBtn');
        const timestamp = document.getElementById('timestamp');
        
        let abortController = null;
        let isFetching = false;
        
        function hideAllStates() {
            statusLoading.classList.add('hidden');
            statusSuccess.classList.add('hidden');
            statusError.classList.add('hidden');
            responseSection.classList.add('hidden');
        }
        
        function showLoading() {
            hideAllStates();
            statusLoading.classList.remove('hidden');
        }
        
        function showSuccess(status) {
            hideAllStates();
            statusSuccess.classList.remove('hidden');
            statusText.textContent = status || 'Healthy';
        }
        
        function showError(message) {
            hideAllStates();
            statusError.classList.remove('hidden');
            errorText.textContent = message || 'Health Check Failed';
        }
        
        function formatTimestamp() {
            const now = new Date();
            return now.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
        }
        
        async function fetchHealth() {
            if (isFetching) return;
            
            isFetching = true;
            retryBtn.disabled = true;
            showLoading();
            
            abortController = new AbortController();
            const timeoutId = setTimeout(() => abortController.abort(), 10000);
            
            try {
                const response = await fetch('/healthz', {
                    method: 'GET',
                    signal: abortController.signal
                });
                
                clearTimeout(timeoutId);
                
                const data = await response.json();
                
                if (response.ok) {
                    const statusValue = data.status || 'Healthy';
                    showSuccess(statusValue);
                    
                    responseSection.classList.remove('hidden');
                    responseData.textContent = JSON.stringify(data, null, 2);
                    timestamp.textContent = 'Last checked: ' + formatTimestamp();
                } else {
                    const errorMsg = data.message || `HTTP ${response.status}`;
                    showError('Health Check Failed: ' + errorMsg);
                    timestamp.textContent = 'Failed at: ' + formatTimestamp();
                }
            } catch (error) {
                clearTimeout(timeoutId);
                let errorMessage = 'Unable to reach service';
                
                if (error.name === 'AbortError') {
                    errorMessage = 'Connection timeout';
                } else if (error instanceof TypeError) {
                    errorMessage = 'Network error';
                }
                
                showError(errorMessage);
                timestamp.textContent = 'Failed at: ' + formatTimestamp();
            } finally {
                clearTimeout(timeoutId);
                isFetching = false;
                retryBtn.disabled = false;
            }
        }
        
        retryBtn.addEventListener('click', () => {
            if (!isFetching) {
                fetchHealth();
            }
        });
        
        fetchHealth();
    </script>
</body>
</html>
